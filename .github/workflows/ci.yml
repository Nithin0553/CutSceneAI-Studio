name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            cir/pyproject.toml
            preview/pyproject.toml
            backend/pyproject.toml

      - name: Install development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "./cir[dev]" -e "./preview[dev]" -e "./backend[dev]"

      - name: Check lint and formatting
        run: |
          python -m ruff check cir/src cir/scripts cir/tests preview/src preview/scripts preview/tests backend/app backend/tests
          python -m ruff format --check cir/src cir/scripts cir/tests preview/src preview/scripts preview/tests backend/app backend/tests

      - name: Check static types
        run: python -m mypy cir/src preview/src backend/app

      - name: Check generated contracts
        run: |
          python cir/scripts/export_schema.py --check
          python preview/scripts/export_artifacts.py --check

      - name: Run tests with coverage
        run: |
          python -m pytest cir/tests preview/tests backend/tests -q \
            --cov=cutsceneai_cir \
            --cov=cutsceneai_preview \
            --cov=app \
            --cov-branch \
            --cov-report=term-missing \
            --cov-fail-under=95
